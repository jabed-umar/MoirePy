name: Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'moirepy/**'
      - 'pyproject.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'tests/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'moirepy/**'
      - 'pyproject.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'tests/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true

    - name: Create Virtual Environment and Install
      run: |
        python -m pip install --upgrade pip
        pip install virtualenv
        virtualenv .venv
        .venv/bin/pip install ".[test]"

    - name: Run tests
      run: |
        # Kill Shadowing: move source away so Python is forced to use site-packages
        mv moirepy _moirepy_shadow
        MPLBACKEND=Agg .venv/bin/pytest tests/
        mv _moirepy_shadow moirepy
